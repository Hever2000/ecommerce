events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Optimización de rendimiento
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost; # Podés cambiarlo por tu IP pública o tu dominio más adelante

        # 1. Rutas de la API (NestJS backend)
        # Todo lo que empiece con /api irá a parar a tu backend
        location /api/ {
            proxy_pass http://ecommerce-backend:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Rutas del Frontend (Next.js)
        # Todo el resto del tráfico irá a parar a tu interfaz de usuario
        location / {
            proxy_pass http://ecommerce-frontend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
